<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sheet Music Creator</title>
    <link rel="stylesheet" href="sheet-music.css">
</head>
<body>
    <div class="container">
        <header>
            <a href="index.html" class="back-link">← Back to Home</a>
            <h1>Sheet Music Creator</h1>
        </header>
        
        <div class="toolbar">
            <div class="toolbar-section">
                <label for="clef-select">Clef:</label>
                <select id="clef-select">
                    <option value="bass" selected>Bass Clef</option>
                    <option value="treble">Treble Clef</option>
                </select>
            </div>
            
            <div class="toolbar-section">
                <label for="key-select">Key:</label>
                <select id="key-select">
                    <option value="C">C Major / A Minor</option>
                    <option value="G">G Major / E Minor</option>
                    <option value="D">D Major / B Minor</option>
                    <option value="A">A Major / F# Minor</option>
                    <option value="E">E Major / C# Minor</option>
                    <option value="B">B Major / G# Minor</option>
                    <option value="F#">F# Major / D# Minor</option>
                    <option value="C#">C# Major / A# Minor</option>
                    <option value="F">F Major / D Minor</option>
                    <option value="Bb">Bb Major / G Minor</option>
                    <option value="Eb">Eb Major / C Minor</option>
                    <option value="Ab">Ab Major / F Minor</option>
                    <option value="Db">Db Major / Bb Minor</option>
                    <option value="Gb">Gb Major / Eb Minor</option>
                    <option value="Cb">Cb Major / Ab Minor</option>
                </select>
            </div>
            
            <div class="toolbar-section">
                <label>Edit note:</label>
                <button id="acc-sharp-btn" class="btn btn-secondary" type="button" title="Set selected note to sharp (♯)">♯</button>
                <button id="acc-flat-btn" class="btn btn-secondary" type="button" title="Set selected note to flat (♭)">♭</button>
                <button id="acc-natural-btn" class="btn btn-secondary" type="button" title="Set selected note to natural (♮)">♮</button>
                <button id="delete-note-btn" class="btn btn-secondary" type="button" title="Delete selected note">Delete</button>
            </div>
            
            <div class="toolbar-section">
                <label for="duration-select">Duration:</label>
                <select id="duration-select">
                    <option value="whole">Whole Note</option>
                    <option value="half">Half Note</option>
                    <option value="quarter" selected>Quarter Note</option>
                    <option value="eighth">Eighth Note</option>
                    <option value="sixteenth">Sixteenth Note</option>
                </select>
            </div>
            
            <div class="toolbar-section">
                <button id="add-title-btn" class="btn btn-secondary" type="button" title="Add or edit the title of the sheet music">Add Title</button>
                <button id="clear-btn" class="btn btn-secondary">Clear All</button>
                <button id="undo-btn" class="btn btn-secondary">Undo</button>
                <button id="add-line-btn" class="btn btn-secondary" type="button" title="Add another staff line (system) below">Add line</button>
                <button id="export-pdf-btn" class="btn btn-primary" type="button" title="Export the current sheet music to PDF">Export to PDF</button>
            </div>
        </div>
        
        <div class="sheet-music-container">
            <canvas id="sheet-music-canvas"></canvas>
        </div>
        
        <div class="instructions">
            <p><strong>Instructions:</strong> Hover over the staff to preview placement, then click to place a note. Notes automatically use the key signature (sharps/flats). Use the Duration dropdown to choose note type. Click an existing note to select it, then set ♯/♭/♮ or delete.</p>
        </div>
    </div>
    
    <script src="sheet-music.js"></script>
</body>
</html>
