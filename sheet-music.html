<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sheet Music Creator</title>
    <link rel="stylesheet" href="sheet-music.css">
</head>
<body>
    <div class="container">
        <header>
            <a href="index.html" class="back-link">← Back to Home</a>
            <h1>Sheet Music Creator</h1>
        </header>
        
        <div class="toolbar">
            <div class="toolbar-section">
                <label for="clef-select">Clef:</label>
                <select id="clef-select">
                    <option value="bass" selected>Bass Clef</option>
                    <option value="treble">Treble Clef</option>
                </select>
            </div>
            
            <div class="toolbar-section">
                <label for="note-select">Note:</label>
                <select id="note-select">
                    <option value="C">C</option>
                    <option value="C#">C#</option>
                    <option value="D">D</option>
                    <option value="D#">D#</option>
                    <option value="E">E</option>
                    <option value="F">F</option>
                    <option value="F#">F#</option>
                    <option value="G">G</option>
                    <option value="G#">G#</option>
                    <option value="A">A</option>
                    <option value="A#">A#</option>
                    <option value="B">B</option>
                </select>
            </div>
            
            <div class="toolbar-section">
                <label for="octave-select">Octave:</label>
                <select id="octave-select">
                    <option value="2">2</option>
                    <option value="3" selected>3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                </select>
            </div>
            
            <div class="toolbar-section">
                <label for="duration-select">Duration:</label>
                <select id="duration-select">
                    <option value="whole">Whole Note</option>
                    <option value="half">Half Note</option>
                    <option value="quarter" selected>Quarter Note</option>
                    <option value="eighth">Eighth Note</option>
                    <option value="sixteenth">Sixteenth Note</option>
                </select>
            </div>
            
            <div class="toolbar-section">
                <button id="clear-btn" class="btn btn-secondary">Clear All</button>
                <button id="undo-btn" class="btn btn-secondary">Undo</button>
            </div>
        </div>
        
        <div class="sheet-music-container">
            <canvas id="sheet-music-canvas"></canvas>
        </div>
        
        <div class="instructions">
            <p><strong>Instructions:</strong> Click on the staff to add notes. Select the note, octave, and duration from the toolbar above.</p>
        </div>
    </div>
    
    <script src="sheet-music.js"></script>
</body>
</html>
