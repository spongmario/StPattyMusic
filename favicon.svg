<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" aria-hidden="true">
  <defs>
    <linearGradient id="note" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6B5BFF"/>
      <stop offset="100%" style="stop-color:#4A3FCC"/>
    </linearGradient>
  </defs>
  <!-- Note head (oval) with face -->
  <ellipse cx="32" cy="36" rx="14" ry="10" fill="url(#note)" stroke="#3d3399" stroke-width="2"/>
  <!-- Stem -->
  <rect x="44" y="8" width="5" height="32" rx="2" fill="url(#note)" stroke="#3d3399" stroke-width="1.5"/>
  <!-- Flag (eighth note) -->
  <path fill="url(#note)" stroke="#3d3399" stroke-width="1.5" stroke-linejoin="round"
    d="M49 8 L49 18 Q58 14 56 22 Q54 28 49 26 L49 18 Z"/>
  <!-- Cute face: eyes -->
  <circle cx="27" cy="34" r="3" fill="#1a1a1a"/>
  <circle cx="37" cy="34" r="3" fill="#1a1a1a"/>
  <circle cx="27.6" cy="33.2" r="0.8" fill="#fff"/>
  <circle cx="37.6" cy="33.2" r="0.8" fill="#fff"/>
  <!-- Smile -->
  <path fill="none" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"
    d="M26 40 Q32 44 38 40"/>
</svg>
