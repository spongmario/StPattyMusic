<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Piano - Key Helper</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Virtual Piano with Key Helper</h1>
        
        <div class="key-selector-section">
            <h2>Select a Key</h2>
            <div class="key-buttons">
                <div class="major-keys">
                    <h3>Major Keys</h3>
                    <div class="button-group">
                        <button class="key-btn" data-key="C">C Major</button>
                        <button class="key-btn" data-key="C#">C# Major</button>
                        <button class="key-btn" data-key="D">D Major</button>
                        <button class="key-btn" data-key="D#">D# Major</button>
                        <button class="key-btn" data-key="E">E Major</button>
                        <button class="key-btn" data-key="F">F Major</button>
                        <button class="key-btn" data-key="F#">F# Major</button>
                        <button class="key-btn" data-key="G">G Major</button>
                        <button class="key-btn" data-key="G#">G# Major</button>
                        <button class="key-btn" data-key="A">A Major</button>
                        <button class="key-btn" data-key="A#">A# Major</button>
                        <button class="key-btn" data-key="B">B Major</button>
                    </div>
                </div>
                <div class="minor-keys">
                    <h3>Minor Keys</h3>
                    <div class="button-group">
                        <button class="key-btn" data-key="Cm">C Minor</button>
                        <button class="key-btn" data-key="C#m">C# Minor</button>
                        <button class="key-btn" data-key="Dm">D Minor</button>
                        <button class="key-btn" data-key="D#m">D# Minor</button>
                        <button class="key-btn" data-key="Em">E Minor</button>
                        <button class="key-btn" data-key="Fm">F Minor</button>
                        <button class="key-btn" data-key="F#m">F# Minor</button>
                        <button class="key-btn" data-key="Gm">G Minor</button>
                        <button class="key-btn" data-key="G#m">G# Minor</button>
                        <button class="key-btn" data-key="Am">A Minor</button>
                        <button class="key-btn" data-key="A#m">A# Minor</button>
                        <button class="key-btn" data-key="Bm">B Minor</button>
                    </div>
                </div>
            </div>
            <div class="selected-key-display">
                <p id="selected-key-text">No key selected</p>
                <p id="key-notes-text"></p>
            </div>
        </div>

        <div class="piano-container">
            <div class="piano" id="piano">
                <!-- Piano keys will be generated by JavaScript -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
